# POST   /projects                                       创建项目
# GET    /projects                                       项目列表
# GET    /projects/{project_id}                          项目详情
# DELETE /projects/{project_id}                          删除项目
# POST   /projects/{project_id}/run                      启动工作流
# GET    /projects/{project_id}/workflow/status          工作流状态
# POST   /projects/{project_id}/workflow/continue        继续工作流
# POST   /projects/{project_id}/workflow/discuss          讨论当前检查点
# POST   /projects/{project_id}/workflow/advance          确认进入下一环节
# GET    /projects/{project_id}/workflow/states           阶段状态快照
# GET    /projects/{project_id}/workflow/executions       执行历史
# GET    /projects/{project_id}/workflow/executions/{eid} 执行详情
# GET    /projects/{project_id}/workflow/executions/{eid}/logs  执行关联日志
# POST   /projects/{project_id}/conversations             创建对话
# POST   /projects/{project_id}/conversations/{cid}/messages  发送消息
# GET    /projects/{project_id}/conversations/{cid}/messages  消息历史
# GET    /projects/{project_id}/artifacts                 产物列表
# GET    /projects/{project_id}/artifacts/{aid}           产物详情
# GET    /projects/{project_id}/artifacts/{aid}/download  下载产物
# POST   /projects/{project_id}/export/prd                导出产物
# GET    /projects/{project_id}/export/{eid}              导出状态
# GET    /projects/{project_id}/export/{eid}/download     下载导出
# GET    /usage/tokens                                   Token 用量统计
# GET    /projects/{project_id}/usage/logs               模型调用日志
# GET    /projects/{project_id}/usage/logs/{lid}         日志详情
