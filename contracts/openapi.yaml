  /projects/{project_id}/usage/logs:
    get:
      tags: [Token Usage]
      summary: 获取模型调用日志
      description: 分页获取项目所有模型调用日志，按时间倒序。支持按 Provider、阶段、状态过滤。
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: provider_name
          in: query
          schema:
            type: string
          description: 按 Provider 过滤
          example: "deepseek"
        - name: stage
          in: query
          schema:
            $ref: "#/components/schemas/WorkflowStage"
          description: 按阶段过滤
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CallStatus"
          description: 按调用状态过滤
      responses:
        "200":
          description: 模型调用日志列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelExecutionLogListResponse"
        "404":
          description: 项目不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{project_id}/usage/logs/{log_id}:
    get:
      tags: [Token Usage]
      summary: 获取单条模型调用日志详情
      description: 获取单次模型调用的完整日志，包含发送的 Prompt 和返回的响应文本。
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: log_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 模型调用日志详情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ModelExecutionLogResponse"
                  - type: object
                    properties:
                      prompt_text:
                        type: string
                        description: 发送的完整 Prompt
                      response_text:
                        type: string
                        nullable: true
                        description: 模型返回的原始文本
                      structured_output:
                        type: object
                        nullable: true
                        description: 结构化输出
        "404":
          description: 项目或日志不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

