        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceWorkflowRequest"
      responses:
        "202":
          description: 工作流已推进
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowStatusResponse"

