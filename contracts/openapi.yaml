  /projects/{project_id}/artifacts/{artifact_id}:
    get:
      tags: [Artifacts]
      summary: 获取产物详情
      description: 获取单个产物的完整内容 (Markdown)。
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 产物详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponse"
        "404":
          description: 项目或产物不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{project_id}/artifacts/{artifact_id}/download:
    get:
      tags: [Artifacts]
      summary: 下载产物文件
      description: 下载产物为 Markdown 文件。
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 文件下载
          content:
            text/markdown:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
